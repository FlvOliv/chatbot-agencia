services:
  postgres:
    image: postgres:16-alpine
    container_name: malu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: malu
      POSTGRES_USER: malu
      POSTGRES_PASSWORD: malu
    ports:
      - "5433:5432"
    volumes:
      - malu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U malu -d malu"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: malu-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - malu_redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  malu_pgdata:
  malu_redisdata:
